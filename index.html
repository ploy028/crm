<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Your Title Here</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Base styles */
        body { font-family: Arial, sans-serif; }
        .touch-target { min-width: 44px; min-height: 44px; }

        /* Mobile Styles */
        @media (max-width: 640px) {
            body { padding: 10px; }
            .container { padding: 20px; }
            /* More mobile styles */
        }

        /* Tablet Styles */
        @media (min-width: 641px) and (max-width: 1024px) {
            body { padding: 20px; }
            /* More tablet styles */
        }

        /* Touch devices */
        @media (pointer: coarse) {
            .touch-target { background-color: #f0f0f0; }
            /* More touch styles */
        }

        /* Landscape Modes */
        @media (orientation: landscape) {
            /* Landscape-specific styles */
        }

        /* Safe Area Support */
        @supports (padding: env(safe-area-inset)) {
            body { padding: env(safe-area-inset); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-xl">Welcome to the CRM</h1>
        <button class="touch-target bg-blue-500 text-white rounded">Click Me</button>
        <!-- Other page contents -->
    </div>
</body>
</html>
